<!DOCTYPE html>
<html>
<head>
    <title>Anime Magic</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Moves the UI to the bottom so it doesn't block the face */
            align-items: center;
            background-color: #1a1a1a; /* Dark background for the gaps */
            
            /* CHANGED: 'contain' ensures the full image is always visible */
            background-size: contain; 
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.5s ease-in-out;
            color: white;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
            background-image: url('https://pic.re/image');
        }

        .overlay {
            background: rgba(0, 0, 0, 0.6); 
            padding: 20px 40px;
            border-radius: 20px 20px 0 0; /* Rounded top corners */
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }

        .magic-button {
            padding: 12px 30px;
            font-size: 18px;
            background-color: #ff4757;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.8);
            transition: 0.2s;
            margin-bottom: 10px;
        }

        .magic-button:hover {
            background-color: #ff6b81;
            transform: translateY(-2px);
        }

        .magic-button:active {
            transform: scale(0.95);
        }

        h1 { margin: 10px 0; font-size: 24px; }
        p { margin: 5px 0 15px 0; opacity: 0.9; }
    </style>
</head>
<body id="bg-body">

    <div class="overlay">
        <h1 id="status">Anime Magic</h1>
        <p>Full view enabled!</p>
        <button class="magic-button" onclick="changeImage()">Summon Next</button>
    </div>

    <script>
        function changeImage() {
            const statusText = document.getElementById('status');
            const body = document.getElementById('bg-body');
            
            statusText.innerText = "Summoning...";

            const cacheBuster = new Date().getTime();
            const imageUrl = `https://pic.re/image?${cacheBuster}`;
            
            const tempImage = new Image();
            tempImage.src = imageUrl;
            tempImage.onload = () => {
                body.style.backgroundImage = `url('${imageUrl}')`;
                statusText.innerText = "Character Found!";
            };
        }
    </script>

</body>
</html>
